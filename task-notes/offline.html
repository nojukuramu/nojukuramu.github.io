<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Task Notes</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #fdf8ef;
      color: #2d2d2d;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: #fff7c0;
      border-radius: 18px;
      padding: 40px 32px;
      box-shadow: 2px 4px 16px rgba(0,0,0,0.12);
      max-width: 360px;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p  { font-size: 15px; color: #6b6b6b; margin-bottom: 20px; }
    a  {
      display: inline-block;
      padding: 10px 24px;
      background: #f59e0b;
      color: #fff;
      border-radius: 20px;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { background: #d97706; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📴</div>
    <h1>You're offline</h1>
    <p>Task Notes couldn't reach the network. Your tasks are still safe in your browser.</p>
    <a href="index.html">Try again</a>
  </div>
</body>
</html>
