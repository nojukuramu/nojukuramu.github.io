<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lost · The Atelier</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='none' stroke='%236C5CE7' stroke-width='2'/%3E%3Cpolygon points='16,5 27,22 5,22' fill='none' stroke='%2300b3a4' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%236C5CE7'/%3E%3C/svg%3E" />
  <script>
    (function () {
      try {
        var s = localStorage.getItem('atelier:theme');
        var t = s || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/static/home/css/home.css" />
  <style>
    .lost { max-width: 640px; margin: 0 auto; padding: 18vh 22px 0; text-align: center; }
    .lost .glyph { font-size: clamp(3rem, 12vw, 6rem); color: var(--brand); animation: spin 12s linear infinite; display: inline-block; }
    .lost h1 { font-size: clamp(1.8rem, 5vw, 3rem); margin: 10px 0 8px; }
    .lost p { color: var(--muted); margin-bottom: 26px; }
    .lost .btn { margin: 4px; }
  </style>
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <div class="lost">
    <div class="glyph" aria-hidden="true">✦</div>
    <h1>This sigil leads nowhere.</h1>
    <p>The page you sought has wandered off — or never existed. The workshop, however, is right this way.</p>
    <a class="btn btn-primary" href="/">Back to the Atelier</a>
    <a class="btn btn-ghost" href="/magic_circles/">Open Magic Circles</a>
  </div>
  <script>
    try {
      console.log("%c✦ 404 — but not all who wander are lost.", "color:#6C5CE7;font-weight:bold");
      console.log("%cThe real secrets live on the homepage. Start at the footer ✦.", "color:#888");
    } catch (e) {}
  </script>
</body>
</html>
