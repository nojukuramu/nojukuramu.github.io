<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Certain RPG Game - Phaser.js Edition</title>

    <!-- Meta Tags -->
    <meta name="description"
        content="A magic-based RPG game built with Phaser.js featuring procedural world generation and spell crafting.">
    <meta name="theme-color" content="#1a1a2e">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
            font-family: Arial, sans-serif;
        }

        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #game-container canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Loading screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading-screen h1 {
            color: #fff;
            font-size: 2em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(100, 100, 255, 0.5);
        }

        #loading-screen .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #6666ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Cursor */
        #game-container {
            cursor: crosshair;
        }

        /* Inventory Bar */
        #inventory-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            /* Hidden by default, shown in GameScene */
            gap: 6px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .inv-slot {
            width: 48px;
            height: 48px;
            background: rgba(30, 30, 40, 0.9);
            border: 2px solid rgba(100, 100, 120, 0.5);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            position: relative;
            transition: all 0.15s ease;
        }

        .inv-slot:hover {
            border-color: rgba(150, 150, 180, 0.8);
            background: rgba(50, 50, 70, 0.9);
        }

        .inv-slot.active {
            border-color: #6af;
            box-shadow: 0 0 10px rgba(100, 170, 255, 0.4);
        }

        .inv-slot .key-hint {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-family: monospace;
        }

        .inv-slot .cast-indicator {
            position: absolute;
            bottom: 3px;
            right: 3px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
        }

        .inv-slot .cast-indicator.ready {
            background: #0f0;
        }

        .inv-slot .cast-indicator.partial {
            background: #ff0;
        }

        .inv-slot .cast-indicator.fallback {
            background: #f00;
        }
    </style>
</head>

<body>
    <!-- Loading screen -->
    <div id="loading-screen">
        <h1>Loading...</h1>
        <div class="loader"></div>
    </div>

    <!-- Inventory Bar -->
    <div id="inventory-bar">
        <div class="inv-slot active" data-slot="0">
            <span class="key-hint">1</span>
            📜
            <div class="cast-indicator fallback"></div>
        </div>
        <div class="inv-slot" data-slot="1">
            <span class="key-hint">2</span>
            📜
            <div class="cast-indicator fallback"></div>
        </div>
        <div class="inv-slot" data-slot="2">
            <span class="key-hint">3</span>
            📜
            <div class="cast-indicator fallback"></div>
        </div>
        <div class="inv-slot" data-slot="3">
            <span class="key-hint">4</span>
            📜
            <div class="cast-indicator fallback"></div>
        </div>
        <div class="inv-slot" data-slot="4">
            <span class="key-hint">5</span>
            📜
            <div class="cast-indicator fallback"></div>
        </div>
        <div class="inv-slot" data-slot="5">
            <span class="key-hint">6</span>
            📜
            <div class="cast-indicator fallback"></div>
        </div>
        <div class="inv-slot" data-slot="6">
            <span class="key-hint">7</span>
            📜
            <div class="cast-indicator fallback"></div>
        </div>
        <div class="inv-slot" data-slot="7">
            <span class="key-hint">8</span>
            📜
            <div class="cast-indicator fallback"></div>
        </div>
    </div>

    <!-- Game container -->
    <div id="game-container"></div>

    <!-- Phaser.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

    <!-- Core Config (shared with original) -->
    <script>
        window.STATIC_URL = "static/";
    </script>
    <script src="static/js/core/Config.js"></script>

    <!-- Phaser Game Files -->
    <!-- Utils -->
    <script src="static/js/phaser/utils/Platform.js"></script>
    <script src="static/js/phaser/utils/SeededRandom.js"></script>

    <!-- Config -->
    <script src="static/js/phaser/config/ChunkPresets.js"></script>

    <!-- World -->
    <script src="static/js/phaser/world/BiomeRenderer.js"></script>
    <script src="static/js/phaser/world/ChunkManager.js"></script>
    <script src="static/js/phaser/world/PathwayRenderer.js"></script>

    <!-- Entities -->
    <script src="static/js/phaser/entities/PlayerSprite.js"></script>
    <script src="static/js/phaser/entities/EnemySprite.js"></script>
    <script src="static/js/phaser/entities/ProjectileSprite.js"></script>

    <!-- Game Systems -->
    <script src="static/js/phaser/game/Item.js"></script>
    <script src="static/js/phaser/game/InventorySystem.js"></script>

    <!-- Effects -->
    <script src="static/js/phaser/effects/MinimapSystem.js"></script>

    <!-- UI (mobile touch controls) -->
    <script src="static/js/phaser/ui/TouchControls.js"></script>

    <!-- Scenes -->
    <script src="static/js/phaser/scenes/BootScene.js"></script>
    <script src="static/js/phaser/scenes/MenuScene.js"></script>
    <script src="static/js/phaser/scenes/GameScene.js"></script>
    <script src="static/js/phaser/scenes/MagicEditorScene.js"></script>

    <!-- Main Game File -->
    <script src="static/js/phaser/game.js"></script>

    <script>
        // Hide loading screen once Phaser is ready
        document.addEventListener('DOMContentLoaded', () => {
            // Wait a bit for Phaser to init
            setTimeout(() => {
                const loadingScreen = document.getElementById('loading-screen');
                loadingScreen.classList.add('hidden');

                // Remove from DOM after transition
                setTimeout(() => {
                    loadingScreen.remove();
                }, 500);
            }, 1000);
        });
    </script>
</body>

</html>
